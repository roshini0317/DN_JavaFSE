<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Feedback</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .event-image {
            width: 250px;
            height: 150px;
            border: 2px solid black;
            cursor: pointer;
        }
        #fee {
            color: blue;
            font-weight: bold;
        }
        #charCount {
            color: green;
            font-weight: bold;
        }
    </style>
    <script>
        function validatePhone() {
            let phone =
                document.getElementById("phone").value;
            if (phone.length !== 10) {
                alert("Phone number must contain exactly 10 digits.");
            }
        }
        function showFee() {
            let event =
                document.getElementById("eventType").value;
            let fee = "";
            if (event === "Cultural Festival") {
                fee = "₹200";
            }
            else if (event === "Sports Meet") {
                fee = "₹300";
            }
            else if (event === "Skill Workshop") {
                fee = "₹500";
            }
            document.getElementById("fee").innerHTML =
                "Event Fee: " + fee;
        }
        function submitFeedback() {

            alert("Thank you! Your feedback has been submitted.");
        }
        function enlargeImage(img) {
            img.style.width = "400px";
            img.style.height = "250px";
        }
        function countCharacters() {
            let text =
                document.getElementById("feedback").value;
            document.getElementById("charCount").innerHTML =
                "Characters Typed: " + text.length;
        }
    </script>
</head>
<body>
    <h2>Community Event Feedback Form</h2>
    <label>Phone Number:</label><br>
    <input type="text"
           id="phone"
           placeholder="Enter 10-digit phone number"
           onblur="validatePhone()">
    <br><br>
    <label>Select Event:</label><br>
    <select id="eventType" onchange="showFee()">
        <option value="">-- Select Event --</option>
        <option>Cultural Festival</option>
        <option>Sports Meet</option>
        <option>Skill Workshop</option>
    </select>
    <p id="fee"></p>
    <h3>Event Preview</h3>
    <img src="images/event.jpg"
         alt="Community Event"
         class="event-image"
         ondblclick="enlargeImage(this)">
    <p>Double-click the image to enlarge it.</p>
    <label>Feedback:</label><br>
    <textarea id="feedback"
              rows="5"
              cols="40"
              placeholder="Share your experience..."
              onkeyup="countCharacters()">
    </textarea>
    <p id="charCount">Characters Typed: 0</p>
    <button onclick="submitFeedback()">
        Submit Feedback
    </button>
</body>
</html>
