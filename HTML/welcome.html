<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Banner</title>
    <style>
        #welcomeBanner {
            background-color: blue;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 24px;
        }
        .highlight {
            background-color: yellow;
            padding: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="welcomeBanner">
        Welcome Back, Resident!
    </div>
    <p>
        Register for upcoming events and enjoy
        <span style="color:red; font-weight:bold;">
            20% OFF on Premium Workshops
        </span>
        this month.
    </p>
    <p class="highlight">
        New cultural and sports events have been added this week.
    </p>
    <p class="highlight">
        Early registration closes on Sunday.
    </p>
</body>
</html>
