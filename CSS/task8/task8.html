<!DOCTYPE html>
<html lang="en">
<head>
    <title>Local Community Event Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Local Community Event Portal</h1>
    </header>

    <main class="container">

        <!-- Event Cards -->
        <div class="eventCard">
            <h2>Community Clean-Up Drive</h2>
            <p>Help keep public spaces clean and beautiful.</p>
        </div>

        <div class="eventCard">
            <h2>Food & Culture Festival</h2>
            <p>Enjoy local food, music, and cultural programs.</p>
        </div>

        <!-- Form Section -->
        <section class="form-section">
            <h2>Event Registration</h2>

            <form>
                <input type="text" placeholder="Enter Your Name" class="selected-field">

                <input type="email" placeholder="Enter Your Email">

                <button type="submit">Register</button>
            </form>
        </section>
        <section class="visibility-demo">
            <h2>Visibility Comparison</h2>

            <div class="box visible-box">
                Normal Visible Box
            </div>

            <div class="box hidden-box">
                visibility: hidden
            </div>

            <div class="box none-box">
                display: none
            </div>

            <div class="box visible-box">
                Next Visible Box
            </div>
        </section>

    </main>

</body>
</html>
