<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Event Gallery</title>
    <style>
        .eventImage {
            width: 200px;
            height: 150px;
            border: 3px solid #333;
            padding: 3px;
        }
        table {
            margin: auto;
            border-spacing: 15px;
        }
        td {
            text-align: center;
        }
        h1 {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Community Event Gallery</h1>
    <table>
        <tr>
            <td>
                <img src="images/culturalfest.jpg"
                     alt="Cultural Festival"
                     title="Annual Cultural Festival"
                     class="eventImage">
                <p>Cultural Festival</p>
            </td>
            <td>
                <img src="images/sportsmeet.jpg"
                     alt="Sports Meet"
                     title="Community Sports Meet"
                     class="eventImage">
                <p>Sports Meet</p>
            </td>
            <td>
                <img src="images/workshop.jpg"
                     alt="Skill Workshop"
                     title="Skill Development Workshop"
                     class="eventImage">
                <p>Skill Workshop</p>
            </td>
        </tr>
        <tr>
            <td>
                <img src="images/treeplantation.jpg"
                     alt="Tree Plantation Drive"
                     title="Environmental Awareness Program"
                     class="eventImage">
                <p>Tree Plantation Drive</p>
            </td>
            <td>
                <img src="images/healthcamp.jpg"
                     alt="Health Camp"
                     title="Free Health Checkup Camp"
                     class="eventImage">
                <p>Health Camp</p>
            </td>
            <td>
                <img src="images/communitymeeting.jpg"
                     alt="Community Meeting"
                     title="Residents Community Meeting"
                     class="eventImage">
                <p>Community Meeting</p>
            </td>
        </tr>
    </table>
</body>
</html>
